            background-image: linear-gradient(rgb(229, 242, 239), rgb(211, 215, 237));
        }

        .modern-button {
            background-color: #38916B;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.3s;
        }

        .modern-button:hover {
            background-color: #73e361;
            transform: translateY(-2px);
        }

        .modern-button:active {
            background-color: #38916B;
            transform: translateY(0);
        }
    </style>

        #blupetals .cls-1 {

        .grid0 {
            fill: #ededed;

        .grid1,

            stroke: #fff;

            stroke-miterlimit: 10

        .grid2 {

        .grid3 {
            fill: #3f4696;

        .grid4 {
            fill: none;
            stroke: #3f4696;
            stroke-miterlimit: 10
        }

        #bluepetal-0 {
            transform: rotate(-90deg);

        #bluepetal-1 {
